<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Architect Exam — Practice Quiz</title>
<style>
/* ─── CSS Custom Properties ─────────────────────────────── */
:root {
  --bg:          #1a1f2e;
  --surface:     #242938;
  --surface2:    #2d3347;
  --border:      #3a4057;
  --accent:      #e8622a;
  --accent2:     #f0935a;
  --text:        #e8eaf0;
  --text2:       #8b93a8;
  --success:     #52c87a;
  --danger:      #e85252;
  --warn:        #f0c040;
  --radius:      8px;
  --radius-lg:   14px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:          #f4f6fb;
  --surface:     #ffffff;
  --surface2:    #eef0f7;
  --border:      #d0d5e8;
  --accent:      #c94f1a;
  --accent2:     #e06030;
  --text:        #1a1f2e;
  --text2:       #5a6275;
  --success:     #2a9d50;
  --danger:      #cc3333;
  --warn:        #c08800;
  --shadow:      0 4px 24px rgba(0,0,0,0.1);
}

/* ─── Reset & Base ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input { font-family: inherit; outline: none; }
a { color: var(--accent); text-decoration: none; }

/* ─── Nav ───────────────────────────────────────────────── */
#nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
#nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 1rem; color: var(--text);
}
#nav-logo svg { width: 28px; height: 28px; }
#nav-right { display: flex; align-items: center; gap: 12px; }
.nav-btn {
  background: none; color: var(--text2); font-size: 0.85rem;
  padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border);
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }

/* ─── Layout ─────────────────────────────────────────────── */
#app { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

/* ─── Typography ─────────────────────────────────────────── */
h1 { font-size: 1.8rem; font-weight: 700; }
h2 { font-size: 1.3rem; font-weight: 600; }
h3 { font-size: 1.05rem; font-weight: 600; }
.text-sm  { font-size: 0.85rem; }
.text-xs  { font-size: 0.78rem; }
.text-2   { color: var(--text2); }
.mt-4  { margin-top: 4px; }
.mt-8  { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-8  { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }

/* ─── Cards ──────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow);
}
.card-sm { padding: 16px; border-radius: var(--radius); }

/* ─── Buttons ────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 20px; border-radius: var(--radius); font-size: 0.9rem;
  font-weight: 500; transition: all 0.15s;
}
.btn-primary {
  background: var(--accent); color: #fff;
}
.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled { background: var(--border); color: var(--text2); cursor: default; }
.btn-secondary {
  background: var(--surface2); color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost { background: none; color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.btn-sm { padding: 6px 14px; font-size: 0.82rem; }
.btn-lg { padding: 13px 28px; font-size: 1rem; }

/* ─── Badges ─────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
}
.badge-accent   { background: rgba(232,98,42,0.15); color: var(--accent); }
.badge-success  { background: rgba(82,200,122,0.15); color: var(--success); }
.badge-danger   { background: rgba(232,82,82,0.15);  color: var(--danger); }
.badge-warn     { background: rgba(240,192,64,0.15); color: var(--warn); }
.badge-neutral  { background: var(--surface2); color: var(--text2); }

/* ─── Progress Bar ───────────────────────────────────────── */
.progress-bar {
  height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px; transition: width 0.3s ease;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.progress-fill.danger { background: var(--danger); }
.progress-fill.success { background: var(--success); }

/* ─── Dashboard ──────────────────────────────────────────── */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
@media (max-width: 640px) { .dash-grid { grid-template-columns: 1fr; } }
.readiness-big {
  font-size: 3.5rem; font-weight: 800; color: var(--accent);
  line-height: 1;
}
.domain-bar-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.domain-bar-label { font-size: 0.82rem; width: 30px; font-weight: 600; color: var(--text2); }
.domain-bar-wrap { flex: 1; }
.domain-bar-pct { font-size: 0.82rem; width: 38px; text-align: right; color: var(--text2); }
.bucket-row {
  display: flex; gap: 12px; margin-top: 8px;
}
.bucket-chip {
  flex: 1; text-align: center; padding: 12px 8px;
  background: var(--surface2); border-radius: var(--radius);
}
.bucket-count { font-size: 1.5rem; font-weight: 700; }
.bucket-label { font-size: 0.75rem; color: var(--text2); margin-top: 2px; }
.session-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.session-row:last-child { border-bottom: none; }

/* ─── Mode Select ────────────────────────────────────────── */
.mode-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 20px; }
@media (max-width: 620px) { .mode-grid { grid-template-columns: 1fr; } }
.mode-card {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; cursor: pointer;
  transition: all 0.15s;
}
.mode-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.mode-card.selected { border-color: var(--accent); background: rgba(232,98,42,0.07); }
.mode-icon { font-size: 2rem; margin-bottom: 10px; }
.mode-title { font-weight: 700; margin-bottom: 6px; }
.mode-desc { font-size: 0.82rem; color: var(--text2); line-height: 1.5; }

/* ─── Config Panels ──────────────────────────────────────── */
.config-panel { margin-top: 24px; }
.config-section { margin-bottom: 20px; }
.config-label { font-size: 0.85rem; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.preset-row { display: flex; gap: 8px; flex-wrap: wrap; }
.preset-btn {
  padding: 7px 16px; border-radius: var(--radius); font-size: 0.85rem; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  transition: all 0.15s;
}
.preset-btn:hover { border-color: var(--accent); color: var(--accent); }
.preset-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.custom-input {
  padding: 7px 12px; border-radius: var(--radius); font-size: 0.85rem;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  width: 100px; transition: border 0.15s;
}
.custom-input:focus { border-color: var(--accent); }
.custom-input.error { border-color: var(--danger); }
.input-error { font-size: 0.78rem; color: var(--danger); margin-top: 4px; }
.timer-option {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  border: 2px solid var(--border); border-radius: var(--radius); margin-bottom: 8px;
  cursor: pointer; transition: all 0.15s;
}
.timer-option:hover { border-color: var(--accent); }
.timer-option.selected { border-color: var(--accent); background: rgba(232,98,42,0.07); }
.timer-option input[type="radio"] { accent-color: var(--accent); }
.domain-option {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius);
  margin-bottom: 8px; cursor: pointer; transition: all 0.15s;
}
.domain-option:hover { border-color: var(--accent); }
.domain-option.selected { border-color: var(--accent); background: rgba(232,98,42,0.07); }

/* ─── Quiz Screen ────────────────────────────────────────── */
.quiz-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.quiz-meta { display: flex; align-items: center; gap: 12px; }
.q-counter { font-size: 0.85rem; color: var(--text2); }
.q-domain-badge { font-size: 0.78rem; }
.timer-display {
  font-family: 'Courier New', monospace; font-size: 1rem; font-weight: 700;
  color: var(--text); min-width: 60px; text-align: right;
}
.timer-display.warn { color: var(--warn); }
.timer-display.danger { color: var(--danger); }
.question-text {
  font-size: 1.05rem; line-height: 1.65; margin: 20px 0;
  background: var(--surface2); padding: 20px; border-radius: var(--radius);
  border-left: 3px solid var(--accent);
}
.choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.choice-btn {
  display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px;
  background: var(--surface2); border: 2px solid var(--border);
  border-radius: var(--radius); text-align: left; color: var(--text);
  font-size: 0.95rem; line-height: 1.5; transition: all 0.15s; width: 100%;
}
.choice-btn:hover:not(:disabled) { border-color: var(--accent); }
.choice-btn.selected { border-color: var(--accent); background: rgba(232,98,42,0.1); }
.choice-btn.correct { border-color: var(--success); background: rgba(82,200,122,0.1); }
.choice-btn.wrong   { border-color: var(--danger);  background: rgba(232,82,82,0.1); }
.choice-btn:disabled { cursor: default; }
.choice-letter {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; min-width: 28px;
  background: var(--border); border-radius: 6px;
  font-weight: 700; font-size: 0.85rem; margin-top: 1px;
}
.choice-btn.selected .choice-letter { background: var(--accent); color: #fff; }
.choice-btn.correct .choice-letter  { background: var(--success); color: #fff; }
.choice-btn.wrong   .choice-letter  { background: var(--danger);  color: #fff; }
.choice-text { flex: 1; }
.explanation-panel {
  margin-top: 16px; padding: 16px 20px;
  background: var(--surface2); border-radius: var(--radius);
  border-left: 3px solid var(--success);
  font-size: 0.92rem; line-height: 1.6;
}
.explanation-label { font-size: 0.78rem; font-weight: 700; color: var(--success); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.quiz-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; flex-wrap: wrap; gap: 10px; }
.quiz-actions-left { display: flex; gap: 8px; }
.kbd-hint { font-size: 0.75rem; color: var(--text2); margin-top: 12px; text-align: center; }
.kbd { display: inline-block; padding: 1px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; font-size: 0.72rem; }
.flag-btn {
  padding: 7px 14px; border-radius: var(--radius); font-size: 0.82rem;
  background: none; border: 1px solid var(--border); color: var(--text2);
  transition: all 0.15s;
}
.flag-btn.flagged { border-color: var(--warn); color: var(--warn); background: rgba(240,192,64,0.1); }
.flag-btn:hover { border-color: var(--warn); color: var(--warn); }

/* ─── Question Navigator ─────────────────────────────────── */
.nav-toggle-btn {
  padding: 7px 14px; border-radius: var(--radius); font-size: 0.82rem;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
}
#q-navigator {
  margin-top: 16px; padding: 16px;
  background: var(--surface2); border-radius: var(--radius);
  display: none;
}
#q-navigator.open { display: block; }
.nav-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.nav-cell {
  width: 34px; height: 34px; border-radius: 6px; font-size: 0.78rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  background: var(--surface); border: 1px solid var(--border); color: var(--text2);
  transition: all 0.12s; position: relative;
}
.nav-cell:hover { border-color: var(--accent); color: var(--accent); }
.nav-cell.current { border-color: var(--accent); color: var(--accent); background: rgba(232,98,42,0.12); }
.nav-cell.answered { background: var(--surface2); border-color: #5a6080; color: var(--text); }
.nav-cell.answered.correct-nav { border-color: var(--success); }
.nav-cell.flagged::after {
  content: ''; position: absolute; top: 2px; right: 2px;
  width: 6px; height: 6px; background: var(--warn); border-radius: 50%;
}

/* ─── Results ────────────────────────────────────────────── */
.score-hero {
  text-align: center; padding: 32px;
  background: var(--surface); border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}
.score-number {
  font-size: 5rem; font-weight: 800; line-height: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.pass-badge {
  display: inline-block; padding: 6px 20px; border-radius: 20px;
  font-size: 1.1rem; font-weight: 700; margin-top: 12px;
}
.pass-badge.pass { background: rgba(82,200,122,0.2); color: var(--success); }
.pass-badge.fail { background: rgba(232,82,82,0.2); color: var(--danger); }
.results-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
.results-table th, .results-table td {
  padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.results-table th { color: var(--text2); font-weight: 600; }
.review-item {
  padding: 20px; border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 12px;
}
.review-item.incorrect { border-color: rgba(232,82,82,0.3); }
.review-q-text { font-size: 0.95rem; line-height: 1.55; margin: 10px 0; }
.review-choices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.review-choice {
  display: flex; gap: 10px; padding: 8px 12px; border-radius: 6px;
  font-size: 0.87rem; line-height: 1.4;
}
.review-choice.correct-ans { background: rgba(82,200,122,0.1); color: var(--success); }
.review-choice.user-wrong  { background: rgba(232,82,82,0.1);  color: var(--danger); }
.review-choice.neutral     { color: var(--text2); }
.review-explanation { font-size: 0.87rem; line-height: 1.55; color: var(--text2); padding: 10px 14px; background: var(--surface2); border-radius: 6px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 14px; border-radius: 20px; font-size: 0.82rem;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
  transition: all 0.15s;
}
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ─── Empty state ────────────────────────────────────────── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text2); }
.empty-icon { font-size: 3rem; margin-bottom: 12px; }

/* ─── Toast ──────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 20px; font-size: 0.88rem; box-shadow: var(--shadow);
  transition: transform 0.25s ease; z-index: 999; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ─── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Attribution (triple-embedded, do not remove) ──────── */
#credit {
  position: fixed; bottom: 10px; right: 14px; z-index: 9998;
  font-size: 0.72rem; color: var(--text2); opacity: 0.7;
  pointer-events: none; user-select: none;
  font-family: -apple-system, sans-serif; letter-spacing: 0.02em;
}
body::after {
  content: "Created by: Milind";
  position: fixed; bottom: 10px; right: 14px; z-index: 9997;
  font-size: 0.72rem; color: var(--text2); opacity: 0;
  pointer-events: none;
}
#nav::after {
  content: "Created by: Milind";
  font-size: 0.75rem; color: var(--text2); opacity: 0.65;
  margin-left: 8px; white-space: nowrap; pointer-events: none;
}
</style>
</head>

<!-- NAV -->
<nav id="nav">
  <div id="nav-logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="7" fill="#e8622a"/>
      <path d="M7 21L14 7L21 21M10 16.5H18" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
    Claude Architect Quiz
  </div>

    <span id="due-badge" class="badge badge-warn" style="display:none">⏰ <span id="due-count">0</span> due</span>
    <button class="nav-btn" id="theme-toggle">☀ Light</button>
    <button class="nav-btn" id="reset-btn" onclick="confirmReset()">↺ Reset</button>
  </div>
</nav>

<!-- Attribution — Created by: Milind -->
<div id="credit">Created by: Milind</div>

<!-- APP CONTAINER -->
<div id="app"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA: injected by build.py
// ═══════════════════════════════════════════════════════════════
/*QUESTIONS_DATA_PLACEHOLDER*/

// ═══════════════════════════════════════════════════════════════
// STORAGE MANAGER
// ═══════════════════════════════════════════════════════════════
const Storage = (() => {
  const KEYS = { progress: 'caq_progress', sessions: 'caq_sessions', prefs: 'caq_prefs' };
  let _p = null, _s = null, _pr = null;

  function _load() {
    try {
      _p  = JSON.parse(localStorage.getItem(KEYS.progress)  || '{}');
      _s  = JSON.parse(localStorage.getItem(KEYS.sessions)  || '[]');
      _pr = JSON.parse(localStorage.getItem(KEYS.prefs)     || '{}');
    } catch(e) {
      _p = {}; _s = []; _pr = {};
    }
  }

  function _save() {
    try {
      localStorage.setItem(KEYS.progress, JSON.stringify(_p));
      localStorage.setItem(KEYS.sessions, JSON.stringify(_s));
      localStorage.setItem(KEYS.prefs,    JSON.stringify(_pr));
    } catch(e) { showToast('Warning: could not save progress (storage full?)'); }
  }

  function _defaultRecord() {
    return {
      times_seen: 0, times_correct: 0, times_incorrect: 0,
      last_seen_date: null, consecutive_correct: 0,
      sm2_interval: 1, sm2_ease_factor: 2.5, sm2_next_review: null
    };
  }

  function getProgress(id) {
    if (!_p[id]) _p[id] = _defaultRecord();
    return _p[id];
  }

  function updateProgress(id, wasCorrect) {
    const rec = getProgress(id);
    const today = todayISO();
    rec.times_seen++;
    rec.last_seen_date = today;
    if (wasCorrect) {
      rec.times_correct++;
      rec.consecutive_correct++;
    } else {
      rec.times_incorrect++;
      rec.consecutive_correct = 0;
    }
    // SM-2
    const quality = wasCorrect ? 4 : 1;
    if (quality >= 3) {
      rec.sm2_interval = Math.max(1, Math.round(rec.sm2_interval * rec.sm2_ease_factor));
    } else {
      rec.sm2_interval = 1;
    }
    rec.sm2_ease_factor = Math.max(1.3,
      rec.sm2_ease_factor + 0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)
    );
    rec.sm2_next_review = addDays(today, rec.sm2_interval);
    _p[id] = rec;
    _save();
  }

  function getBucket(rec) {
    if (!rec || rec.times_seen === 0) return 'new';
    if (rec.consecutive_correct >= 2) return 'mastered';
    return 'learning';
  }

  function getBucketCounts() {
    let counts = { new: 0, learning: 0, mastered: 0 };
    for (const q of QUESTIONS) {
      const rec = _p[q.id];
      counts[getBucket(rec)]++;
    }
    return counts;
  }

  function getDueCount() {
    const today = todayISO();
    return QUESTIONS.filter(q => {
      const rec = _p[q.id];
      return rec && rec.sm2_next_review && rec.sm2_next_review <= today;
    }).length;
  }

  function addSession(session) {
    _s.unshift(session);
    if (_s.length > 5) _s = _s.slice(0, 5);
    _save();
  }

  function getSessions() { return _s; }

  function getPref(key, def) {
    return _pr[key] !== undefined ? _pr[key] : def;
  }

  function setPref(key, val) {
    _pr[key] = val;
    _save();
  }

  function getDashboardStats() {
    const domainCodes = ['D1','D2','D3','D4','D5'];
    const domainWeights = { D1:0.27, D2:0.18, D3:0.20, D4:0.20, D5:0.15 };
    const domainNames = {
      D1:'Agentic Architecture', D2:'Tool Design & MCP',
      D3:'Claude Code Config',   D4:'Prompt Engineering',
      D5:'Context Management'
    };

    const domainStats = {};
    for (const code of domainCodes) {
      const qs = QUESTIONS.filter(q => q.domain === code || (code === 'D1' && q.domain === 'SQ'));
      const attempted = qs.filter(q => _p[q.id] && _p[q.id].times_seen > 0);
      const correct   = qs.filter(q => _p[q.id] && _p[q.id].times_correct > 0);
      domainStats[code] = {
        name: domainNames[code],
        total: qs.length,
        attempted: attempted.length,
        correct_count: correct.length,
        accuracy: attempted.length > 0
          ? Math.round(attempted.filter(q => _p[q.id].times_correct > _p[q.id].times_incorrect).length / attempted.length * 100)
          : null
      };
    }

    // Per-domain accuracy for weighting (only domains with attempts)
    let weightedSum = 0, weightTotal = 0;
    for (const code of domainCodes) {
      if (domainStats[code].accuracy !== null) {
        weightedSum  += domainStats[code].accuracy * domainWeights[code];
        weightTotal  += domainWeights[code];
      }
    }
    const readiness = weightTotal > 0 ? Math.round(weightedSum / weightTotal) : null;

    // Top 5 weak questions (most missed)
    const weakQs = QUESTIONS
      .filter(q => _p[q.id] && _p[q.id].times_seen > 0 && _p[q.id].times_incorrect > 0)
      .sort((a, b) => _p[b.id].times_incorrect - _p[a.id].times_incorrect)
      .slice(0, 5);

    return {
      readiness,
      domainStats,
      buckets: getBucketCounts(),
      dueCount: getDueCount(),
      sessions: getSessions(),
      weakQs
    };
  }

  function exportProgress() {
    const data = { progress: _p, sessions: _s, prefs: _pr, exported: todayISO() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `claude_quiz_progress_${todayISO()}.json`;
    a.click(); URL.revokeObjectURL(url);
  }

  function importProgress(jsonStr) {
    let data;
    try { data = JSON.parse(jsonStr); }
    catch(e) { throw new Error('Invalid JSON file'); }
    if (!data.progress || typeof data.progress !== 'object') throw new Error('Missing progress data');
    // Merge: take record with higher times_seen
    for (const [id, rec] of Object.entries(data.progress)) {
      if (!_p[id] || rec.times_seen > _p[id].times_seen) {
        _p[id] = rec;
      }
    }
    // Merge sessions
    if (Array.isArray(data.sessions)) {
      const all = [..._s, ...data.sessions];
      const seen = new Set();
      _s = all.filter(s => {
        const key = `${s.date}${s.mode}${s.score}`;
        if (seen.has(key)) return false;
        seen.add(key); return true;
      }).slice(0, 5);
    }
    _save();
  }

  function reset() {
    _p = {}; _s = []; _pr = {};
    localStorage.removeItem(KEYS.progress);
    localStorage.removeItem(KEYS.sessions);
    localStorage.removeItem(KEYS.prefs);
  }

  function checkAvailable() {
    try {
      localStorage.setItem('__test__','1');
      localStorage.removeItem('__test__');
      return true;
    } catch(e) { return false; }
  }

  _load();
  return {
    getProgress, updateProgress, getBucket, getBucketCounts, getDueCount,
    addSession, getSessions, getPref, setPref, getDashboardStats,
    exportProgress, importProgress, reset, checkAvailable,
    // expose raw for testing
    _p: () => _p
  };
})();

// ═══════════════════════════════════════════════════════════════
// QUIZ ENGINE
// ═══════════════════════════════════════════════════════════════
const Engine = (() => {
  const DOMAIN_WEIGHTS = { D1:0.27, D2:0.18, D3:0.20, D4:0.20, D5:0.15 };
  // SQ questions are distributed across all domains proportionally
  const DOMAIN_QS = {};
  const DOMAIN_CODES = ['D1','D2','D3','D4','D5'];
  for (const code of DOMAIN_CODES) {
    DOMAIN_QS[code] = QUESTIONS.filter(q => q.domain === code || q.domain === 'SQ' && code === 'D1');
  }
  // Actually treat SQ as part of general pool for exam mode
  const ALL_QS = QUESTIONS;
  const DOMAIN_PURE = {};
  for (const code of DOMAIN_CODES) {
    DOMAIN_PURE[code] = QUESTIONS.filter(q => q.domain === code);
  }
  // SQ questions pool
  const SQ_QS = QUESTIONS.filter(q => q.domain === 'SQ');

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function selectExamQuestions(count) {
    // Domain-weighted selection without replacement
    // First figure out how many per domain
    const counts = {};
    let assigned = 0;
    const sortedCodes = [...DOMAIN_CODES].sort((a,b) => DOMAIN_WEIGHTS[b] - DOMAIN_WEIGHTS[a]);

    for (let i = 0; i < sortedCodes.length; i++) {
      const code = sortedCodes[i];
      if (i < sortedCodes.length - 1) {
        counts[code] = Math.floor(count * DOMAIN_WEIGHTS[code]);
        assigned += counts[code];
      } else {
        counts[code] = count - assigned;
      }
    }

    // Select from each domain + SQ proportionally
    const sqCount = Math.round(count * (12 / QUESTIONS.length));
    let result = [];
    const sqSelected = shuffle(SQ_QS).slice(0, sqCount);
    result.push(...sqSelected);

    for (const code of DOMAIN_CODES) {
      const pool = shuffle(DOMAIN_PURE[code]);
      const need = Math.max(0, counts[code] - (code === 'D1' ? sqCount : 0));
      result.push(...pool.slice(0, need));
    }

    // Trim or pad to exact count
    result = shuffle(result).slice(0, count);
    if (result.length < count) {
      const used = new Set(result.map(q => q.id));
      const extra = shuffle(ALL_QS.filter(q => !used.has(q.id)));
      result.push(...extra.slice(0, count - result.length));
    }
    return shuffle(result);
  }

  function selectDrillQuestions(domain, count) {
    const pool = domain === 'SQ'
      ? SQ_QS
      : DOMAIN_PURE[domain] || [];
    return shuffle(pool).slice(0, count);
  }

  function selectWeakQuestions(count) {
    const prog = Storage._p();
    const newQ      = QUESTIONS.filter(q => !prog[q.id] || prog[q.id].times_seen === 0);
    const learningQ = QUESTIONS.filter(q => {
      const r = prog[q.id];
      return r && r.times_seen > 0 && r.consecutive_correct < 2;
    });
    const masteredQ = QUESTIONS.filter(q => {
      const r = prog[q.id];
      return r && r.consecutive_correct >= 2;
    });

    let pool = shuffle([...newQ, ...learningQ]);
    if (pool.length < count) {
      const spillover = Math.min(
        Math.ceil(count * 0.1),
        masteredQ.length
      );
      pool = pool.concat(shuffle(masteredQ).slice(0, spillover));
    }
    return pool.slice(0, count);
  }

  function getWeakPoolSize() {
    const prog = Storage._p();
    const newQ      = QUESTIONS.filter(q => !prog[q.id] || prog[q.id].times_seen === 0);
    const learningQ = QUESTIONS.filter(q => {
      const r = prog[q.id];
      return r && r.times_seen > 0 && r.consecutive_correct < 2;
    });
    return newQ.length + learningQ.length;
  }

  function calculateScaledScore(correct, total) {
    if (total === 0) return 100;
    return Math.round(100 + (correct / total) * 900);
  }

  function isPassing(score) { return score >= 720; }

  return {
    selectExamQuestions, selectDrillQuestions, selectWeakQuestions,
    getWeakPoolSize, calculateScaledScore, isPassing, DOMAIN_PURE, SQ_QS,
    DOMAIN_CODES, DOMAIN_WEIGHTS
  };
})();

let _timerInterval = null;
let _timerRemaining = 0;
let _timerOnTick = null;
let _timerOnExpire = null;
let _timerStartWall = null;
let _timerStartRemaining = null;

function timerStart(seconds, onTick, onExpire) {
  timerClear();
  _timerRemaining = seconds;
  _timerStartWall = Date.now();
  _timerStartRemaining = seconds;
  _timerOnTick = onTick;
  _timerOnExpire = onExpire;
  _timerInterval = setInterval(() => {
    const elapsed = (Date.now() - _timerStartWall) / 1000;
    _timerRemaining = Math.max(0, _timerStartRemaining - elapsed);
    if (_timerOnTick) _timerOnTick(_timerRemaining);
    if (_timerRemaining <= 0) {
      timerClear();
      if (_timerOnExpire) _timerOnExpire();
    }
  }, 100);
}

function timerReset(seconds) {
  _timerStartWall = Date.now();
  _timerStartRemaining = seconds;
  _timerRemaining = seconds;
}

function timerClear() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function addDays(isoDate, days) {
  const parts = isoDate.split('-');
  const d = new Date(+parts[0], +parts[1]-1, +parts[2]);
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatDate(isoDate) {
  if (!isoDate) return '—';
  const parts = isoDate.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+parts[1]-1]} ${+parts[2]}, ${parts[0]}`;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

let _kbHandler = null;
function removeKeyboardHandler() {
  if (_kbHandler) { document.removeEventListener('keydown', _kbHandler); _kbHandler = null; }
}
function setKeyboardHandler(fn) {
  removeKeyboardHandler();
  _kbHandler = fn;
  document.addEventListener('keydown', _kbHandler);
}

let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function confirmReset() {
  if (confirm('Reset ALL progress? This cannot be undone.')) {
    Storage.reset();
    Router.navigate('dashboard');
    showToast('Progress reset.');
  }
}

  }
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      Storage.importProgress(ev.target.result);
      showToast('Progress imported successfully!');
      Router.navigate('dashboard');
    } catch(err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function setExamCount(n) {

function setTimerMode(mode) {
  _examTimerMode = mode;
  document.getElementById('timer-perq').classList.toggle('selected', mode === 'per_question');
  document.getElementById('timer-overall').classList.toggle('selected', mode === 'overall');
  document.getElementById('timer-perq').querySelector('input').checked = mode === 'per_question';
  document.getElementById('timer-overall').querySelector('input').checked = mode === 'overall';

function setOverallMinutes(val) {

function startExam() {

  const timerValue = _examTimerMode === 'per_question'

    : _examTimerMinutes * 60;
  SESSION = createSession('exam', questions, _examTimerMode, timerValue);

// SCREEN: QUIZ
// ═══════════════════════════════════════════════════════════════
let _navOpen = false;
let _explanationVisible = false;
let _currentTimerDuration = 0;

function renderQuiz(app) {
  if (!SESSION || SESSION.completed) {
    Router.navigate('dashboard'); return;
  }
  _navOpen = false;
  _explanationVisible = false;

  const q = SESSION.questions[SESSION.currentIndex];
  const total = SESSION.questions.length;
  const idx = SESSION.currentIndex;
  const answer = SESSION.answers[q.id];
  const isFlagged = SESSION.flags.has(q.id);
  const isExam = SESSION.mode === 'exam';
  const showFeedback = !isExam && answer !== undefined;
  const prog = Storage.getProgress(q.id);
  const bucket = Storage.getBucket(prog);

  // Build choices HTML
  const letters = ['A','B','C','D'];
  const choicesHTML = letters.map(letter => {
    let cls = 'choice-btn';
    const isSelected = answer && answer.letter === letter;
    const isCorrect  = letter === q.answer;
    if (showFeedback) {
      if (isCorrect) cls += ' correct';
      else if (isSelected) cls += ' wrong';
      cls += ' '; // disabled visually
    } else if (isSelected) {
      cls += ' selected';
    }
    const disabled = (showFeedback || (isExam && answer !== undefined && !answer.tentative)) ? 'disabled' : '';
    return `<button class="${cls}" ${disabled}
      onclick="selectAnswer('${letter}')" data-letter="${letter}">
      <span class="choice-letter">${letter}</span>
      <span class="choice-text">${esc(q.choices[letter])}</span>
    </button>`;
  }).join('');

  // Explanation (drill/weak only, after answer)
  let explanationHTML = '';
  if (showFeedback) {
    const correct = answer.correct;
    explanationHTML = `
      <div class="explanation-panel" id="explanation-panel">
        <div class="explanation-label">${correct ? '✓ Correct' : '✗ Incorrect — Correct Answer: ' + q.answer}</div>
        ${esc(q.explanation)}
      </div>`;
  }

  // Timer display
  let timerHTML = '';
  if (SESSION.timerMode === 'per_question') {
    timerHTML = `
      <div>
        <div class="timer-display" id="timer-display">${formatTime(SESSION.timerValue)}</div>
        <div class="progress-bar mt-4" style="width:120px">
          <div class="progress-fill" id="timer-bar" style="width:100%"></div>
        </div>
      </div>`;
  } else if (SESSION.timerMode === 'overall') {
    const elapsed = (Date.now() - SESSION.startTime) / 1000;
    const remaining = Math.max(0, SESSION.timerValue - elapsed);
    timerHTML = `
      <div>
        <div class="timer-display" id="timer-display">${formatTime(remaining)}</div>
        <div class="progress-bar mt-4" style="width:120px">
          <div class="progress-fill" id="timer-bar" style="width:${remaining/SESSION.timerValue*100}%"></div>
        </div>
      </div>`;
  }

  // Build navigator cells
  const navCells = SESSION.questions.map((sq, i) => {
    let cls = 'nav-cell';
    if (i === idx) cls += ' current';
    else if (SESSION.answers[sq.id]) cls += ' answered';
    if (SESSION.flags.has(sq.id)) cls += ' flagged';
    return `<div class="${cls}" onclick="navigateTo(${i})">${i+1}</div>`;
  }).join('');

  // Progress bar
  const progressPct = Math.round((idx + 1) / total * 100);

  // Bucket badge
  const bucketColors = { new: 'badge-neutral', learning: 'badge-accent', mastered: 'badge-success' };

  app.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-meta">
        <span class="q-counter">Question ${idx+1} of ${total}</span>
        <span class="badge ${bucketColors[bucket]} q-domain-badge">${q.domain}</span>
        ${prog.times_seen > 0 ? `<span class="text-xs text-2">${prog.times_correct}/${prog.times_seen} correct</span>` : ''}
      </div>
      ${timerHTML}
    </div>

    <div class="progress-bar mb-16">
      <div class="progress-fill" style="width:${progressPct}%"></div>
    </div>

    <div class="question-text">${esc(q.question)}</div>

    <div class="choices" id="choices-container">
      ${choicesHTML}
    </div>

    ${explanationHTML}

    <div class="quiz-actions">
      <div class="quiz-actions-left">
        <button class="flag-btn ${isFlagged?'flagged':''}" id="flag-btn"
          onclick="toggleFlag()" title="Flag for review">
          ${isFlagged ? '🚩 Flagged' : '⚑ Flag'}
        </button>
        <button class="nav-toggle-btn" onclick="toggleNav()">
          ${_navOpen ? '▲ Hide Navigator' : '▼ Navigator'}
        </button>
      </div>
      <div style="display:flex;gap:8px">
        ${idx > 0 ? `<button class="btn btn-secondary btn-sm" onclick="navigateTo(${idx-1})">← Prev</button>` : ''}
        ${(showFeedback || (isExam && answer !== undefined))
          ? (idx < total - 1
              ? `<button class="btn btn-primary" id="next-btn" onclick="navigateTo(${idx+1})">Next →</button>`
              : `<button class="btn btn-primary" id="next-btn" onclick="submitSession()">Submit →</button>`)
          : (isExam && answer === undefined
              ? `<button class="btn btn-secondary btn-sm" onclick="navigateTo(${Math.min(idx+1, total-1)})">Skip →</button>`
              : '')
        }
      </div>
    </div>

    <div id="q-navigator" class="${_navOpen ? 'open' : ''}">
      <div class="text-xs text-2 mb-8">Click a number to jump to that question</div>
      <div class="nav-grid">${navCells}</div>
    </div>

    <div class="kbd-hint">
      <kbd class="kbd">A</kbd><kbd class="kbd">B</kbd><kbd class="kbd">C</kbd><kbd class="kbd">D</kbd> select
      · <kbd class="kbd">Enter</kbd> confirm/next
      ${!isExam ? '· <kbd class="kbd">Space</kbd> next' : ''}
      · <kbd class="kbd">F</kbd> flag
    </div>
  `;

  // Start timers
  if (SESSION.timerMode === 'per_question' && !answer) {
    _currentTimerDuration = SESSION.timerValue;
    timerStart(SESSION.timerValue,
      rem => updateTimerDisplay(rem, SESSION.timerValue),
      () => { autoSubmitQuestion(); }
    );
  } else if (SESSION.timerMode === 'overall') {
    const elapsed = (Date.now() - SESSION.startTime) / 1000;
    const remaining = Math.max(0, SESSION.timerValue - elapsed);
    if (remaining > 0) {
      timerStart(remaining,
        rem => updateTimerDisplay(rem, SESSION.timerValue),
        () => { submitSession(); }
      );
    }
  }

  // Keyboard handler
  setKeyboardHandler(quizKeyHandler);
}

function updateTimerDisplay(remaining, total) {
  const disp = document.getElementById('timer-display');
  const bar  = document.getElementById('timer-bar');
  if (!disp) return;
  disp.textContent = formatTime(remaining);
  const pct = total > 0 ? (remaining / total) * 100 : 0;
  if (bar) bar.style.width = pct + '%';
  disp.className = 'timer-display' + (remaining < 30 ? ' danger' : remaining < 60 ? ' warn' : '');
  if (bar) {
    bar.className = 'progress-fill' + (remaining < 30 ? ' danger' : remaining < 60 ? ' ' : '');
  }
}

function autoSubmitQuestion() {
  const q = SESSION.questions[SESSION.currentIndex];
  if (!SESSION.answers[q.id]) {
    SESSION.answers[q.id] = { letter: null, correct: false };
    Storage.updateProgress(q.id, false);
  }
  const idx = SESSION.currentIndex;
  const total = SESSION.questions.length;
  if (idx < total - 1) {
    SESSION.currentIndex++;
    renderQuiz(document.getElementById('app'));
  } else {
    submitSession();
  }
}

function selectAnswer(letter) {
  const q = SESSION.questions[SESSION.currentIndex];
  const isExam = SESSION.mode === 'exam';

  // In exam mode: allow changing before "confirming" — we treat clicking as tentative selection
  // In drill/weak: clicking is final
  if (isExam) {
    // Allow re-selection in exam mode; re-render quiz to show Next button
    SESSION.answers[q.id] = { letter, correct: letter === q.answer, tentative: true };
    renderQuiz(document.getElementById('app'));
  } else {
    // Drill / Weak: final selection, show feedback
    if (SESSION.answers[q.id]) return; // already answered
    const correct = letter === q.answer;
    SESSION.answers[q.id] = { letter, correct };
    timerClear();
    Storage.updateProgress(q.id, correct);
    renderQuiz(document.getElementById('app'));
  }
}

function navigateTo(idx) {
  if (idx < 0 || idx >= SESSION.questions.length) return;
  // Commit any tentative exam-mode answer for the current question before navigating
  if (SESSION.mode === 'exam') {
    const curQ = SESSION.questions[SESSION.currentIndex];
    const curAns = SESSION.answers[curQ.id];
    if (curAns && curAns.tentative) {
      curAns.tentative = false;
      Storage.updateProgress(curQ.id, curAns.correct);
    }
  }
  timerClear();
  SESSION.currentIndex = idx;
  renderQuiz(document.getElementById('app'));
}

function toggleFlag() {
  const q = SESSION.questions[SESSION.currentIndex];
  if (SESSION.flags.has(q.id)) SESSION.flags.delete(q.id);
  else SESSION.flags.add(q.id);
  const btn = document.getElementById('flag-btn');
  if (btn) {
    const isFlagged = SESSION.flags.has(q.id);
    btn.className = `flag-btn${isFlagged?' flagged':''}`;
    btn.textContent = isFlagged ? '🚩 Flagged' : '⚑ Flag';
  }
  // Update navigator cell
  const cells = document.querySelectorAll('.nav-cell');
  cells.forEach((cell, i) => {
    const sq = SESSION.questions[i];
    if (sq.id === q.id) cell.classList.toggle('flagged', SESSION.flags.has(sq.id));
  });
}

function toggleNav() {
  _navOpen = !_navOpen;
  const nav = document.getElementById('q-navigator');
  const btn = document.querySelector('.nav-toggle-btn');
  if (nav) nav.classList.toggle('open', _navOpen);
  if (btn) btn.textContent = _navOpen ? '▲ Hide Navigator' : '▼ Navigator';
}

function quizKeyHandler(e) {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const key = e.key.toUpperCase();
  const q = SESSION && SESSION.questions[SESSION.currentIndex];
  if (!q) return;
  const isExam = SESSION.mode === 'exam';
  const answered = SESSION.answers[q.id] && !SESSION.answers[q.id].tentative;
  const tentative = SESSION.answers[q.id] && SESSION.answers[q.id].tentative;

  if (['A','B','C','D'].includes(key) && !answered) {
    e.preventDefault();
    selectAnswer(key);
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (isExam && tentative) {
      // Confirm answer in exam mode
      SESSION.answers[q.id].tentative = false;
      Storage.updateProgress(q.id, SESSION.answers[q.id].correct);
      const idx = SESSION.currentIndex;
      const total = SESSION.questions.length;
      timerClear();
      if (idx < total - 1) navigateTo(idx + 1);
      else submitSession();
    } else if (answered || (!isExam && SESSION.answers[q.id])) {
      const idx = SESSION.currentIndex;
      const total = SESSION.questions.length;
      if (idx < total - 1) navigateTo(idx + 1);
      else submitSession();
    }
    return;
  }
  if (e.key === ' ' && !isExam) {
    e.preventDefault();
    if (SESSION.answers[q.id]) {
      const idx = SESSION.currentIndex;
      const total = SESSION.questions.length;
      if (idx < total - 1) navigateTo(idx + 1);
      else submitSession();
    }
    return;
  }
  if (key === 'F') {
    e.preventDefault();
    toggleFlag();
  }
}

function submitSession() {
  timerClear();
  if (!SESSION || SESSION.completed) return;
  SESSION.completed = true;

  // For exam mode: finalize any tentative answers and update progress
  if (SESSION.mode === 'exam') {
    for (const q of SESSION.questions) {
      const ans = SESSION.answers[q.id];
      if (ans) {
        if (ans.tentative) {
          ans.tentative = false;
          Storage.updateProgress(q.id, ans.correct);
        }
      }
    }
    // Score
    const answered = SESSION.questions.filter(q => SESSION.answers[q.id] && SESSION.answers[q.id].letter !== null);
    const correct  = answered.filter(q => SESSION.answers[q.id].correct).length;
    const total    = SESSION.questions.length;
    const score    = Engine.calculateScaledScore(correct, total);
    Storage.addSession({
      date: todayISO(),
      mode: 'exam',
      score,
      domain: null,
      question_count: total
    });
    Router.navigate('results', { score, correct, total });
  } else {
    const total   = SESSION.questions.length;
    const correct = SESSION.questions.filter(q => SESSION.answers[q.id] && SESSION.answers[q.id].correct).length;
    const accuracy = total > 0 ? Math.round(correct / total * 100) : 0;
    Storage.addSession({
      date: todayISO(),
      mode: SESSION.mode,
      score: accuracy,
      domain: SESSION.domain,
      question_count: total
    });
    Router.navigate('summary', { correct, total, accuracy });
  }
}

let _resultsFilter = 'all';

function renderResults(app, params) {
  if (!params || !SESSION) { Router.navigate('dashboard'); return; }
  const { score, correct, total } = params;
  const passing = Engine.isPassing(score);

  // Per-domain breakdown
  const domainBreakdown = Engine.DOMAIN_CODES.map(code => {
    const qs = SESSION.questions.filter(q => q.domain === code || (q.domain === 'SQ'));
    const att = qs.filter(q => SESSION.answers[q.id] && SESSION.answers[q.id].letter !== null);
    const cor = att.filter(q => SESSION.answers[q.id].correct);
    const pct = att.length > 0 ? Math.round(cor.length / att.length * 100) : null;
    return { code, name: DOMAIN_INFO[code]?.name || code, total: qs.length, attempted: att.length, correct: cor.length, pct };
  }).filter(d => d.total > 0);

  const domainTableRows = domainBreakdown.map(d => `
    <tr>
      <td>${d.code}</td>
      <td>${esc(d.name)}</td>
      <td>${d.attempted}/${d.total}</td>
      <td>${d.correct}</td>
      <td>${d.pct !== null ? d.pct + '%' : '—'}</td>
    </tr>`).join('');

  app.innerHTML = `
    <div class="score-hero">
      <div class="text-sm text-2 mb-8">Your Score</div>
      <div class="score-number">${score}</div>
      <div class="text-xs text-2 mt-4">out of 1,000</div>
      <div class="pass-badge ${passing ? 'pass' : 'fail'} mt-8">${passing ? '✓ PASS' : '✗ FAIL'}</div>
      <div class="text-sm mt-16">${correct} correct out of ${total} questions (${Math.round(correct/total*100)}%)</div>
      <div class="text-sm text-2 mt-4">Pass threshold: 720/1000</div>
    </div>

    <div class="card mt-16">
      <h3 class="mb-16">Domain Breakdown</h3>
      <table class="results-table">
        <thead><tr><th>Domain</th><th>Name</th><th>Attempted</th><th>Correct</th><th>Score</th></tr></thead>
        <tbody>${domainTableRows}</tbody>
      </table>
    </div>

    <div class="card mt-16">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3>Question Review</h3>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setResultsFilter('all', this)">All (${total})</button>
          <button class="filter-btn" onclick="setResultsFilter('incorrect', this)">
            Incorrect (${SESSION.questions.filter(q => SESSION.answers[q.id] && !SESSION.answers[q.id].correct).length})
          </button>
          <button class="filter-btn" onclick="setResultsFilter('flagged', this)">
            Flagged (${SESSION.flags.size})
          </button>
        </div>
      </div>
      <div id="review-list">
        ${buildReviewList('all')}
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="Router.navigate('mode_select')">New Quiz</button>
      <button class="btn btn-secondary" onclick="Router.navigate('dashboard')">Dashboard</button>
    </div>
  `;
}

function buildReviewList(filter) {
  if (!SESSION) return '';
  let qs = SESSION.questions;
  if (filter === 'incorrect') qs = qs.filter(q => SESSION.answers[q.id] && !SESSION.answers[q.id].correct);
  if (filter === 'flagged')   qs = qs.filter(q => SESSION.flags.has(q.id));

  if (qs.length === 0) return '<div class="text-sm text-2">No questions match this filter.</div>';

  return qs.map((q, i) => {
    const ans = SESSION.answers[q.id];
    const userLetter = ans ? ans.letter : null;
    const isCorrect = ans && ans.correct;
    const isFlagged = SESSION.flags.has(q.id);

    const choicesHTML = ['A','B','C','D'].map(letter => {
      let cls = 'review-choice neutral';
      if (letter === q.answer) cls = 'review-choice correct-ans';
      else if (letter === userLetter && !isCorrect) cls = 'review-choice user-wrong';
      const marker = letter === q.answer ? '✓' : (letter === userLetter && !isCorrect ? '✗' : ' ');
      return `<div class="${cls}"><span style="font-weight:700;width:20px">${marker}</span><span><strong>${letter})</strong> ${esc(q.choices[letter])}</span></div>`;
    }).join('');

    return `<div class="review-item ${isCorrect ? '' : 'incorrect'}">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${isCorrect ? 'badge-success' : 'badge-danger'}">${isCorrect ? '✓' : '✗'}</span>
        <span class="text-xs text-2">${q.id} · ${q.domain}</span>
        ${isFlagged ? '<span class="badge badge-warn">🚩</span>' : ''}
        ${!ans || ans.letter === null ? '<span class="badge badge-neutral">Unanswered</span>' : ''}
      </div>
      <div class="review-q-text">${esc(q.question)}</div>
      <div class="review-choices">${choicesHTML}</div>
      <div class="review-explanation">${esc(q.explanation)}</div>
    </div>`;
  }).join('');
}

function setResultsFilter(filter, btn) {
  _resultsFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const list = document.getElementById('review-list');
  if (list) list.innerHTML = buildReviewList(filter);
}

          <h3>Missed Questions (${missedQs.length})</h3>
        </div>

      </div>
    ` : `<div class="card mt-16"><div class="empty-state"><div class="empty-icon">🎉</div><div>Perfect score!</div></div></div>`}

    <div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap">

function retryMissed() {
  const missedQs = SESSION.questions.filter(q =>
    SESSION.answers[q.id] && !SESSION.answers[q.id].correct
  );
  if (missedQs.length === 0) return;
  SESSION = createSession(SESSION.mode || 'drill', missedQs, null, null);
  Router.navigate('quiz');
}

// ═══════════════════════════════════════════════════════════════
// INLINE TESTS (callable from browser console: runTests())
// ═══════════════════════════════════════════════════════════════
function runTests() {
  const results = [];
  function test(name, fn) {
    try { fn(); results.push({ name, pass: true }); }
    catch(e) { results.push({ name, pass: false, err: e.message }); }
  }

  // Data tests
  test('QUESTIONS loaded', () => { if (!QUESTIONS || QUESTIONS.length !== 1157) throw new Error(`Expected 1157, got ${QUESTIONS?.length}`); });
  test('All have 4 choices', () => {
    const bad = QUESTIONS.filter(q => Object.keys(q.choices).length !== 4);
    if (bad.length) throw new Error(`Bad: ${bad[0].id}`);
  });
  test('All valid answers', () => {
    const bad = QUESTIONS.filter(q => !['A','B','C','D'].includes(q.answer));
    if (bad.length) throw new Error(`Bad: ${bad[0].id}`);
  });

  // SM-2 tests
  test('SM-2 correct answer increases interval', () => {
    Storage.reset();
    Storage.updateProgress('Q1', true);
    const rec = Storage.getProgress('Q1');
    if (rec.sm2_interval < 1) throw new Error('Interval should be >= 1');
    if (rec.sm2_ease_factor <= 1.3) throw new Error('Ease factor too low');
  });
  test('SM-2 incorrect answer resets interval to 1', () => {
    Storage.reset();
    Storage.updateProgress('Q1', true);
    Storage.updateProgress('Q1', true);
    Storage.updateProgress('Q1', false);
    const rec = Storage.getProgress('Q1');
    if (rec.sm2_interval !== 1) throw new Error(`Expected interval 1, got ${rec.sm2_interval}`);
    if (rec.consecutive_correct !== 0) throw new Error('consecutive_correct should be 0');
  });
  test('SM-2 ease factor never below 1.3', () => {
    Storage.reset();
    for (let i = 0; i < 10; i++) Storage.updateProgress('Q2', false);
    const rec = Storage.getProgress('Q2');
    if (rec.sm2_ease_factor < 1.3) throw new Error(`Ease factor ${rec.sm2_ease_factor} < 1.3`);
  });

  // Bucket tests
  test('New → Learning on first answer', () => {
    Storage.reset();
    const rec0 = Storage.getProgress('Q10');
    if (Storage.getBucket(rec0) !== 'new') throw new Error('Should be new');
    Storage.updateProgress('Q10', true);
    const rec1 = Storage.getProgress('Q10');
    if (Storage.getBucket(rec1) !== 'learning') throw new Error(`Should be learning, got ${Storage.getBucket(rec1)}`);
  });
  test('Learning → Mastered after 2 consecutive correct', () => {
    Storage.reset();
    Storage.updateProgress('Q20', true);
    Storage.updateProgress('Q20', true);
    const rec = Storage.getProgress('Q20');
    if (Storage.getBucket(rec) !== 'mastered') throw new Error(`Should be mastered, got ${Storage.getBucket(rec)}, consecutive=${rec.consecutive_correct}`);
  });
  test('Mastered → Learning on wrong answer', () => {
    Storage.reset();
    Storage.updateProgress('Q30', true);
    Storage.updateProgress('Q30', true);
    Storage.updateProgress('Q30', false);
    const rec = Storage.getProgress('Q30');
    if (Storage.getBucket(rec) !== 'learning') throw new Error('Should be learning after wrong');
  });

  // Scoring tests
  test('Scaled score: 60/60 = 1000', () => {
    const s = Engine.calculateScaledScore(60, 60);
    if (s !== 1000) throw new Error(`Expected 1000, got ${s}`);
  });
  test('Scaled score: 0/60 = 100', () => {
    const s = Engine.calculateScaledScore(0, 60);
    if (s !== 100) throw new Error(`Expected 100, got ${s}`);
  });
  test('Scaled score: 47/60 = 805', () => {
    const s = Engine.calculateScaledScore(47, 60);
    if (s !== 805) throw new Error(`Expected 805, got ${s}`);
  });
  test('Scaled score: 42/60 = 730 (pass)', () => {
    const s = Engine.calculateScaledScore(42, 60);
    if (!Engine.isPassing(s)) throw new Error(`${s} should pass`);
  });
  test('Scaled score: 41/60 = 715 (fail)', () => {
    const s = Engine.calculateScaledScore(41, 60);
    if (Engine.isPassing(s)) throw new Error(`${s} should fail`);
  });

  // Domain weighting test
  test('selectExamQuestions(60) returns 60', () => {
    const qs = Engine.selectExamQuestions(60);
    if (qs.length !== 60) throw new Error(`Expected 60, got ${qs.length}`);
  });
  test('selectExamQuestions no duplicates', () => {
    const qs = Engine.selectExamQuestions(60);
    const ids = qs.map(q => q.id);
    const unique = new Set(ids);
    if (unique.size !== ids.length) throw new Error('Duplicate IDs in selection');
  });
  test('selectDrillQuestions(D1, 10) returns 10 D1 questions', () => {
    const qs = Engine.selectDrillQuestions('D1', 10);
    if (qs.length !== 10) throw new Error(`Expected 10, got ${qs.length}`);
    if (qs.some(q => q.domain !== 'D1')) throw new Error('Non-D1 question in drill');
  });

  // Export/Import round-trip
  test('Export/Import round-trip preserves data', () => {
    Storage.reset();
    Storage.updateProgress('Q100', true);
    Storage.updateProgress('Q200', false);
    // simulate export/import
    const exported = { progress: Storage._p(), sessions: Storage.getSessions(), prefs: {} };
    Storage.reset();
    Storage.importProgress(JSON.stringify(exported));
    const rec = Storage.getProgress('Q100');
    if (rec.times_correct !== 1) throw new Error('times_correct not preserved');
    const rec2 = Storage.getProgress('Q200');
    if (rec2.times_incorrect !== 1) throw new Error('times_incorrect not preserved');
  });

  // Summary
  const passed = results.filter(r => r.pass).length;
  console.log(`\n=== TEST RESULTS: ${passed}/${results.length} passed ===`);
  results.forEach(r => {
    console.log(`  ${r.pass ? '✅' : '❌'} ${r.name}${r.err ? ' — ' + r.err : ''}`);
  });
  return passed === results.length;
}

  const orig = URL.createObjectURL;
  URL.createObjectURL = (b) => { exportRan = true; return 'blob:test'; };
  Storage.exportProgress();
  URL.createObjectURL = orig;
  log(exportRan, 'Export creates blob URL');

  // 18. Import round-trip
  Storage.reset();
  Storage.updateProgress('Q99', false);
  const expData = { progress: Storage._p(), sessions: [], prefs: {} };
  Storage.reset();
  Storage.importProgress(JSON.stringify(expData));
  log(Storage.getProgress('Q99').times_incorrect === 1, 'Import round-trip preserves data');

  // 19. Invalid import error
  let importErr = '';
  try { Storage.importProgress('bad{json'); } catch(e) { importErr = e.message; }
  log(importErr.includes('Invalid JSON') || importErr.includes('JSON'), `Invalid import throws error`);

  // 20. Bucket total = 1157
  const bc = Storage.getBucketCounts();
  log(bc.new + bc.learning + bc.mastered === 1157, `Bucket total = ${bc.new+bc.learning+bc.mastered}/1157`);

  // 21. Weak Areas config renders
  Router.navigate('weak_config');
  await wait(400);
  log(!!document.querySelector('.config-panel'), 'Weak Areas config panel renders');

  // Restore app to normal state
  Router.navigate('dashboard');

  // ─── Summary ──────────────────────────────────────────────
  const passed = results.filter(r => r.pass).length;
  const total  = results.length;
  sum.innerHTML = `<div style="margin-top:20px;padding:16px;border-radius:8px;font-weight:700;font-size:1.1rem;background:${passed===total?'rgba(82,200,122,0.2)':'rgba(232,82,82,0.2)'};color:${passed===total?'var(--success)':'var(--danger)'}">
    ${passed}/${total} tests passed${passed===total?' — ALL TESTS PASSED ✓':''}
  </div>`;
  console.log(`Auto-test results: ${passed}/${total}`);
}
</script>
</body>
</html>
